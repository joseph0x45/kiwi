<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiwi</title>
  <meta name="description" content="A local-first list of things you want to do, taste, see, or experience." />
  <meta name="theme-color" content="#F4EEDE" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1 class="app-title">Kiwi</h1>
      <div class="header-actions">
        <span class="tally" id="tally" aria-live="polite"></span>
        <button class="icon-btn" id="importBtn" title="Import backup" aria-label="Import backup">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="icon-btn" id="exportBtn" title="Export backup" aria-label="Export backup">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="canvas" id="canvas">
    <div class="empty-state" id="emptyState">
      <p class="empty-heading">Nothing here yet.</p>
      <p class="empty-sub">Add your first section below — a "Restaurants", "Books", "Wines", whatever you're keeping track of.</p>
    </div>
    <div class="sections-grid" id="sectionsGrid"></div>
  </main>

  <div class="add-section-bar">
    <form class="add-section-form" id="addSectionForm" aria-label="Add new section">
      <input
        type="text"
        class="add-section-input"
        id="addSectionInput"
        placeholder="New section name…"
        maxlength="80"
        autocomplete="off"
        aria-label="Section name"
      />
      <button type="submit" class="add-section-btn">Add section</button>
    </form>
  </div>

  <input type="file" id="importFile" accept=".json" hidden aria-hidden="true" />

  <div class="modal-backdrop" id="modalBackdrop" hidden aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <p class="modal-title" id="modalTitle"></p>
      <p class="modal-body" id="modalBody"></p>
      <div class="modal-actions">
        <button class="btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn-danger" id="modalConfirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
